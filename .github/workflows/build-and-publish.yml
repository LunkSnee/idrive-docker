name: Build and Publish

on:
  push:
    branches: [main]
    paths:
      - "idrive/build/**"
  schedule:
    - cron: "12 9 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-docker-image:
    name: Build Docker image and push to repositories
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sanitize Repository Name
        id: sanitize
        run: |
          echo "IMAGE_LOWERCASE=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Get iDrive version
        id: version
        run: ./idrive/version.sh
      
      - name: Check DockerHub Secrets
        id: check-secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Github Packages (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- NEW: Check if the image currently exists in the registry ---
      - name: Check if image exists in GHCR
        id: check-image
        if: github.event_name != 'push'
        run: |
          # Redirects output to null. If it succeeds, the image exists. If it fails, it does not.
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_LOWERCASE }}:latest > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # --- UPDATED: Only run update checkers if the image already exists ---
      - name: Check for new base image
        if: github.event_name != 'push' && steps.check-image.outputs.exists == 'true'
        id: check-base
        uses: lucacome/docker-image-update-checker@v2.0.0
        with:
          base-image: debian:bookworm-slim
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_LOWERCASE }}:latest

      - name: Check for new iDrive version
        if: github.event_name != 'push' && steps.check-image.outputs.exists == 'true'
        id: check-version
        uses: tyriis/docker-image-tag-exists@v2.1.0
        with:
          registry: ${{ env.REGISTRY }}
          repository: ${{ env.IMAGE_LOWERCASE }}
          tag: ${{ steps.version.outputs.idrive_version }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Dynamic Docker Tags
        id: generate-tags
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_LOWERCASE }}:latest"
          TAGS="$TAGS\n${{ env.REGISTRY }}/${{ env.IMAGE_LOWERCASE }}:${{ steps.version.outputs.idrive_version }}"
          
          if [ "${{ steps.check-secrets.outputs.has_secrets }}" == "true" ]; then
            TAGS="$TAGS\n$DOCKER_USER/idrive-docker:latest"
            TAGS="$TAGS\n$DOCKER_USER/idrive-docker:${{ steps.version.outputs.idrive_version }}"
          fi
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "tags<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$TAGS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      # --- UPDATED: Trigger build if push, base update, version update, OR missing image ---
      - name: Build image and push
        if: >
          github.event_name == 'push' || 
          steps.check-image.outputs.exists == 'false' || 
          steps.check-base.outputs.needs-updating == 'true' || 
          steps.check-version.outputs.tag == 'not found'
        uses: docker/build-push-action@v6
        with:
          context: idrive/build
          tags: ${{ steps.generate-tags.outputs.tags }}
          push: ${{ github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
